name: Package and Publish Skills

on:
  push:
    tags:
      - 'v*'

jobs:
  package-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Package skills as zip files
        run: |
          mkdir -p dist/skills
          TAG=${GITHUB_REF#refs/tags/}
          
          # 1. Pack individual skills with the version tag suffix
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            # Validate SKILL.md exists
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "⚠️  Skipping $skill_name — no SKILL.md found"
              continue
            fi
            zip_path="dist/skills/${skill_name}-${TAG}.zip"
            # Create zip with skill-name/ as root folder inside the archive
            (cd skills && zip -r "../$zip_path" "$skill_name/" -x "*.DS_Store")
            echo "✅ Packaged individual skill: $zip_path"
          done
          
          # 2. Pack all skills together as a bundle with the version tag (e.g. bat-skills-v1.3.1.zip)
          bundle_zip="dist/skills/bat-skills-${TAG}.zip"
          zip -r "$bundle_zip" skills/ -x "*.DS_Store"
          echo "✅ Packaged skills bundle: $bundle_zip"

      - name: Upload skill zips to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          
          # Ensure the release exists
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG not found. Creating a new release..."
            gh release create "$TAG" --generate-notes
          fi
          
          # Upload files to the release
          for zip_file in dist/skills/*.zip; do
            [ -f "$zip_file" ] || continue
            echo "Uploading $zip_file to release $TAG"
            gh release upload "$TAG" "$zip_file" --clobber
          done
